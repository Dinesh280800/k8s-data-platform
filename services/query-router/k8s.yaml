apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-router
  namespace: data-platform
  labels:
    app.kubernetes.io/name: query-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: query-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: query-router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: query-router
          image: data-platform/query-router:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TRINO_URL
              value: http://trino.analytics.svc.cluster.local:8080
            - name: DATABASE_HOST
              value: postgres.store.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: apis
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: query-router
  namespace: data-platform
  labels:
    app.kubernetes.io/name: query-router
spec:
  selector:
    app.kubernetes.io/name: query-router
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: query-router
  namespace: data-platform
spec:
  ingressClassName: nginx
  rules:
    - host: query.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: query-router
                port:
                  name: http
