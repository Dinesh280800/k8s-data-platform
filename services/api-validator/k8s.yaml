apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-validator
  namespace: data-platform
  labels:
    app.kubernetes.io/name: api-validator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-validator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-validator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-validator
          image: localhost/data-platform/api-validator:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: BROKER_URL
              value: amqp://guest:guest@rabbitmq.messaging.svc.cluster.local:5672/
            - name: DATABASE_HOST
              value: postgres.store.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: apis
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: api-validator
  namespace: data-platform
  labels:
    app.kubernetes.io/name: api-validator
spec:
  selector:
    app.kubernetes.io/name: api-validator
  ports:
    - name: http
      port: 80
      targetPort: http
