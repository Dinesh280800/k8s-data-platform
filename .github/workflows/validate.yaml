# .github/workflows/validate.yaml
name: Validate Kubernetes Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/

      - name: Validate YAML manifests
        run: |
          find services/ platform/ cluster/ keda/ -name '*.yaml' -exec kubeval --strict --ignore-missing-schemas {} \;

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Lint Helm values
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm template monitoring prometheus-community/kube-prometheus-stack \
            --values monitoring/prometheus/values.yaml --debug 2>&1 | tail -5 || true
          helm template loki grafana/loki-stack \
            --values monitoring/loki/values.yaml --debug 2>&1 | tail -5 || true
          echo "Helm values checked"

  integration-test:
    runs-on: ubuntu-latest
    needs: [validate, helm-lint]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          config: cluster/kind-config.yaml
          cluster_name: ci-cluster

      - name: Deploy platform
        run: |
          kubectl apply -f services/namespace.yaml
          kubectl apply -f platform/broker/k8s.yaml
          kubectl apply -f platform/store/k8s.yaml
          kubectl apply -f platform/query/trino.yaml
          kubectl apply -f services/api-discovery/k8s.yaml
          kubectl apply -f services/api-validator/k8s.yaml
          kubectl apply -f services/api-enricher/k8s.yaml
          kubectl apply -f services/query-router/k8s.yaml
          kubectl apply -f services/frontend/k8s.yaml

      - name: Wait for infrastructure
        run: |
          kubectl rollout status deployment/rabbitmq -n messaging --timeout=180s || true
          kubectl rollout status deployment/postgres -n store --timeout=180s || true
          kubectl rollout status deployment/frontend -n frontend --timeout=180s || true

      - name: Verify pods
        run: |
          kubectl get pods -A | grep -v Running | grep -v Completed | grep -v STATUS || true
          echo "CI validation complete"
