# .github/workflows/validate.yaml
name: Validate Kubernetes Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/

      - name: Validate YAML manifests
        run: |
          find app/ -name '*.yaml' -exec kubeval --strict {} \;

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Lint Helm values
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          # Validate that values file is parseable YAML
          helm template monitoring prometheus-community/kube-prometheus-stack \
            --values monitoring/prometheus/values.yaml --debug 2>&1 | tail -5 || true
          # Lint the Loki values
          helm template loki grafana/loki-stack \
            --values monitoring/loki/values.yaml --debug 2>&1 | tail -5 || true
          echo "Helm values checked"

  integration-test:
    runs-on: ubuntu-latest
    needs: [validate, helm-lint]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          config: kind/cluster-config.yaml
          cluster_name: ci-cluster

      - name: Deploy application
        run: |
          kubectl apply -f app/namespace.yaml
          kubectl apply -f app/configmap.yaml
          kubectl apply -f app/secret.yaml
          kubectl apply -f app/deployment.yaml
          kubectl apply -f app/service.yaml

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/complex-app -n complex-app --timeout=180s

      - name: Verify pods are ready
        run: |
          kubectl get pods -n complex-app
          READY_COUNT=$(kubectl get pods -n complex-app -l app.kubernetes.io/name=complex-app \
            --field-selector=status.phase=Running --no-headers | wc -l)
          echo "Ready pods: $READY_COUNT"
          [ "$READY_COUNT" -ge 2 ] || exit 1
