# =============================================================================
# POD DISRUPTION BUDGET (PDB)
# =============================================================================
# PDB limits how many pods can be voluntarily disrupted simultaneously.
# Protects against: node drains, cluster upgrades, voluntary evictions.
# Does NOT protect against: crashes, OOMKills, node failures (involuntary).
#
# KEY FIELDS:
# - spec.minAvailable      → Minimum pods that must stay running (number or %)
# - spec.maxUnavailable    → Maximum pods that can be down (number or %)
#   (Use ONE of these, not both)
# - spec.selector          → Which pods this PDB applies to (required)
#
# CUSTOMIZATION:
# - For 3 replicas: minAvailable=2 or maxUnavailable=1 (same effect)
# - For critical services: use higher minAvailable
# - For batch jobs: can tolerate higher maxUnavailable
# =============================================================================

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: complex-app-pdb
  namespace: complex-app
  labels:
    app.kubernetes.io/name: complex-app
spec:
  # At least 2 pods must always be available during voluntary disruptions
  minAvailable: 2
  # Alternative: maxUnavailable: 1   (max 1 pod can be down at a time)
  
  selector:
    matchLabels:
      app.kubernetes.io/name: complex-app
      app.kubernetes.io/component: api-server

  # unhealthyPodEvictionPolicy: IfHealthyBudget  # k8s 1.27+: evict unhealthy pods
                                                   # even if budget is exhausted
