# =============================================================================
# HORIZONTAL POD AUTOSCALER (HPA)
# =============================================================================
# HPA automatically scales the number of pods based on observed metrics.
# Requires metrics-server to be installed in the cluster.
#
# KEY FIELDS:
# - spec.scaleTargetRef       → What to scale (Deployment, StatefulSet, etc.) (required)
# - spec.minReplicas          → Floor for scaling down (required)
# - spec.maxReplicas          → Ceiling for scaling up (required)
# - spec.metrics              → Metrics to scale on (required)
# - spec.behavior             → Fine-tune scale up/down speed (optional but recommended)
#
# HOW IT WORKS:
# desiredReplicas = ceil(currentReplicas × (currentMetricValue / desiredMetricValue))
#
# CUSTOMIZATION:
# - Adjust target CPU/memory percentages based on your app's profile
# - Use custom metrics from Prometheus for business-specific scaling
# - Tune behavior to prevent flapping (too-fast scale down)
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: complex-app-hpa
  namespace: complex-app
  labels:
    app.kubernetes.io/name: complex-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: complex-app                   # Must match deployment name exactly

  minReplicas: 2                        # Never scale below 2 (HA minimum)
  maxReplicas: 10                       # Never scale above 10 (cost/resource ceiling)

  metrics:
    # --- CPU-based scaling ---
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70        # Scale up when avg CPU > 70% of requests
                                        # (100m requested × 70% = trigger at 70m usage)

    # --- Memory-based scaling ---
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80        # Scale up when avg memory > 80% of requests

    # --- Custom metric example (requires Prometheus Adapter) ---
    # - type: Pods
    #   pods:
    #     metric:
    #       name: http_requests_per_second
    #     target:
    #       type: AverageValue
    #       averageValue: "100"         # Scale up when avg RPS > 100 per pod

  # --- Scaling Behavior ---
  # Controls how fast scaling happens to prevent flapping
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # Wait 30s of sustained high metrics before scaling up
      policies:
        - type: Pods
          value: 2                      # Add max 2 pods per 60s
          periodSeconds: 60
        - type: Percent
          value: 50                     # Or add max 50% more pods per 60s
          periodSeconds: 60
      selectPolicy: Max                 # Use whichever policy allows MORE scaling

    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 min of sustained low metrics before scaling down
                                        # Prevents flapping during traffic spikes
      policies:
        - type: Pods
          value: 1                      # Remove max 1 pod per 60s
          periodSeconds: 60
      selectPolicy: Min                 # Use whichever policy allows LESS scaling (conservative)
