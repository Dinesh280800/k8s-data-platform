# =============================================================================
# SECRET
# =============================================================================
# Secrets store sensitive data (passwords, tokens, keys) with base64 encoding.
# NOTE: base64 is NOT encryption. Use sealed-secrets or external-secrets in prod.
#
# KEY FIELDS:
# - metadata.name       → Referenced by pods (required)
# - type                → Opaque (generic), kubernetes.io/tls, kubernetes.io/dockerconfigjson
# - data                → base64-encoded values (required)
# - stringData          → Plain text values (auto-encoded to base64 on apply)
#
# SECURITY NOTES:
# - Never commit real secrets to git; use stringData for demo only
# - In production, use: sealed-secrets, external-secrets-operator, or Vault
# - Enable encryption at rest in etcd for production clusters
#
# CUSTOMIZATION:
# - Replace placeholder values with your actual credentials
# - Use `echo -n 'value' | base64` to encode values for the data field
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: complex-app
  labels:
    app.kubernetes.io/name: complex-app
    app.kubernetes.io/component: secrets
type: Opaque
stringData:                             # stringData accepts plain text (converted to base64 automatically)
  DB_PASSWORD: "change-me-in-prod"      # Database password
  DB_USERNAME: "appuser"                # Database username
  REDIS_PASSWORD: "redis-secret-123"    # Redis auth password
  API_KEY: "demo-api-key-not-real"      # External API key
  JWT_SECRET: "jwt-signing-secret-change-me"  # JWT token signing secret
