# =============================================================================
# CONFIGMAP
# =============================================================================
# ConfigMaps decouple configuration from container images.
# Data is stored as key-value pairs and can be mounted as files or env vars.
#
# KEY FIELDS:
# - metadata.name       → Referenced by pods via envFrom or volumeMounts (required)
# - metadata.namespace  → Must match the pod's namespace (required)
# - data                → Key-value pairs of configuration (required, string values only)
#
# CUSTOMIZATION:
# - Add/remove keys as your app needs
# - For binary data, use binaryData field instead of data
# - ConfigMaps are NOT encrypted; use Secrets for sensitive data
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: complex-app
  labels:
    app.kubernetes.io/name: complex-app
    app.kubernetes.io/component: config
data:
  # Application configuration
  APP_ENV: "development"              # Application environment mode
  APP_PORT: "8080"                    # Port the app listens on
  LOG_LEVEL: "info"                   # Logging verbosity: debug, info, warn, error
  LOG_FORMAT: "json"                  # Log format: json or text
  
  # Database configuration (non-sensitive)
  DB_HOST: "postgres-service.complex-app.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "appdb"
  DB_MAX_CONNECTIONS: "20"
  DB_IDLE_TIMEOUT: "300"
  
  # Redis configuration
  REDIS_HOST: "redis-service.complex-app.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # Feature flags
  FEATURE_CACHE_ENABLED: "true"
  FEATURE_RATE_LIMIT: "100"           # Requests per minute

  # Nginx configuration file (mounted as a file)
  nginx.conf: |
    server {
      listen 8080;
      server_name _;
      
      location /health {
        access_log off;
        return 200 'ok';
      }

      location /ready {
        access_log off;
        return 200 'ready';
      }
      
      location /metrics {
        access_log off;
        default_type text/plain;
        return 200 '# HELP http_requests_total Total number of HTTP requests\n# TYPE http_requests_total counter\nhttp_requests_total{method="GET",status="200"} 1027\nhttp_requests_total{method="GET",status="404"} 3\n# HELP http_request_duration_seconds HTTP request duration\n# TYPE http_request_duration_seconds histogram\nhttp_request_duration_seconds_bucket{le="0.1"} 500\nhttp_request_duration_seconds_bucket{le="0.5"} 900\nhttp_request_duration_seconds_bucket{le="1"} 1000\nhttp_request_duration_seconds_bucket{le="+Inf"} 1027\nhttp_request_duration_seconds_sum 120.5\nhttp_request_duration_seconds_count 1027\n';
      }
      
      location / {
        return 200 'Hello from complex-app!\n';
      }
    }
