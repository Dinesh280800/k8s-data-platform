# =============================================================================
# SERVICE
# =============================================================================
# A Service provides stable networking for a set of pods (load balancing + DNS).
# Pods are selected by label matching.
#
# KEY FIELDS:
# - spec.type         → ClusterIP (internal), NodePort (host port), LoadBalancer (cloud LB)
# - spec.selector     → Labels to match target pods (required)
# - spec.ports        → Port mappings: service port → target (pod) port (required)
#
# CUSTOMIZATION:
# - Change type to NodePort for direct host access on kind
# - Change port numbers to match your app
# - Add sessionAffinity: ClientIP for sticky sessions
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: complex-app-service
  namespace: complex-app
  labels:
    app.kubernetes.io/name: complex-app
    app.kubernetes.io/component: api-server
spec:
  type: ClusterIP                       # Internal-only (use Ingress for external access)
  selector:
    app.kubernetes.io/name: complex-app
    app.kubernetes.io/component: api-server
  ports:
    - name: http
      protocol: TCP
      port: 80                          # Service port (what other pods connect to)
      targetPort: http                  # Pod port (named port from container spec)
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: metrics
  # sessionAffinity: None               # Options: None (default), ClientIP
