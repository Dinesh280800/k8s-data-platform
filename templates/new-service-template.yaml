# =============================================================================
# NEW SERVICE DEPLOYMENT TEMPLATE
# =============================================================================
# Copy this file and replace all occurrences of:
#   SERVICE_NAME    → your service name (e.g., "user-api", "payment-service")
#   SERVICE_IMAGE   → your container image (e.g., "myregistry/my-app:v1.0")
#   SERVICE_PORT    → your app's listen port (e.g., 5000, 3000, 8080)
#
# Usage:
#   sed 's/SERVICE_NAME/my-api/g; s/SERVICE_IMAGE/python:3.12-slim/g; s/SERVICE_PORT/5000/g' \
#     templates/new-service-template.yaml | kubectl apply -f -
#
# Or manually edit and apply:
#   kubectl apply -f templates/new-service-template.yaml
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: SERVICE_NAME
  labels:
    app.kubernetes.io/name: SERVICE_NAME

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: SERVICE_NAME-config
  namespace: SERVICE_NAME
data:
  APP_PORT: "SERVICE_PORT"
  LOG_LEVEL: "info"
  # Add your configuration keys here

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: SERVICE_NAME
  namespace: SERVICE_NAME
  labels:
    app.kubernetes.io/name: SERVICE_NAME
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: SERVICE_NAME
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: SERVICE_NAME
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "SERVICE_PORT"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: SERVICE_IMAGE
          ports:
            - name: http
              containerPort: SERVICE_PORT
          envFrom:
            - configMapRef:
                name: SERVICE_NAME-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30

---
apiVersion: v1
kind: Service
metadata:
  name: SERVICE_NAME
  namespace: SERVICE_NAME
  labels:
    app.kubernetes.io/name: SERVICE_NAME
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: SERVICE_NAME
  ports:
    - name: http
      port: 80
      targetPort: http

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: SERVICE_NAME-ingress
  namespace: SERVICE_NAME
spec:
  ingressClassName: nginx
  rules:
    - host: SERVICE_NAME.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: SERVICE_NAME
                port:
                  name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: SERVICE_NAME-hpa
  namespace: SERVICE_NAME
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: SERVICE_NAME
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: SERVICE_NAME-pdb
  namespace: SERVICE_NAME
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: SERVICE_NAME
