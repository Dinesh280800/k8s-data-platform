apiVersion: v1
kind: Namespace
metadata:
  name: store
  labels:
    app.kubernetes.io/name: store
    app.kubernetes.io/part-of: data-platform
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: store
type: Opaque
stringData:
  username: platform
  password: platform123
  database: apis
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: store
data:
  init.sql: |
    create schema if not exists catalog;
    create table if not exists catalog.apis (
      api_id serial primary key,
      name text not null,
      base_url text not null,
      source text not null,
      discovered_at timestamptz default now()
    );
    create table if not exists catalog.api_endpoints (
      endpoint_id serial primary key,
      api_id int references catalog.apis(api_id),
      method text not null,
      path text not null,
      status_code int,
      latency_ms int,
      checked_at timestamptz default now()
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: store
  labels:
    app.kubernetes.io/name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: database
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: store
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: pg
