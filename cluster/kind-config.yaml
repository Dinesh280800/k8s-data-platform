kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

# ── Cluster sizing: 6 cores / 10 GB RAM / 80 GB disk ──────────────────────
# kind inherits Docker's resource limits – ensure Docker Desktop is set to
# at least 6 CPUs and 8 GB memory before running bootstrap.sh.

networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Ingress (HTTP / HTTPS)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Grafana NodePort 30000 → localhost:3000
      - containerPort: 30000
        hostPort: 3000
        protocol: TCP
      # RabbitMQ management NodePort 30001 → localhost:15672
      - containerPort: 30001
        hostPort: 15672
        protocol: TCP
      # Trino UI NodePort 30002 → localhost:8080
      - containerPort: 30002
        hostPort: 8080
        protocol: TCP

  - role: worker
    labels:
      tier: frontend
      environment: dev

  - role: worker
    labels:
      tier: backend
      environment: dev
