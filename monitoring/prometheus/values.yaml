# =============================================================================
# PROMETHEUS + GRAFANA - Helm Values (kube-prometheus-stack)
# =============================================================================
# This values file configures the kube-prometheus-stack Helm chart which deploys:
# - Prometheus (metrics collection and storage)
# - Grafana (visualization dashboards)
# - Alertmanager (alert routing and notification)
# - Node Exporter (host metrics)
# - kube-state-metrics (Kubernetes object metrics)
#
# INSTALL COMMAND:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring \
#     --values monitoring/prometheus/values.yaml \
#     --wait
#
# KEY SECTIONS:
# - prometheus: Server config, retention, storage
# - grafana: Dashboards, datasources, admin credentials
# - alertmanager: Alert routing and receivers
# - nodeExporter: Host-level metrics
# - kubeStateMetrics: Kubernetes object state metrics
#
# CUSTOMIZATION:
# - Adjust retention/storage for your disk capacity
# - Add custom scrape configs for your services
# - Configure alertmanager receivers (Slack, PagerDuty, email)
# =============================================================================

# --- Global Settings ---
global:
  scrape_interval: 15s                  # How often Prometheus scrapes targets
  evaluation_interval: 15s              # How often to evaluate alert rules

# --- Prometheus Server ---
prometheus:
  enabled: true

  prometheusSpec:
    # Retention: how long to keep metrics data
    retention: 7d                        # Keep 7 days of data (dev: 1-7d, prod: 15-90d)
    retentionSize: "5GB"                 # Max storage size

    # Resource limits for Prometheus server
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi             # PVC size (adjust based on retention)

    # Service Monitor selector - scrape all ServiceMonitors in all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    # Pod Monitor selector
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

    # Additional scrape configs for pods with prometheus.io annotations
    additionalScrapeConfigs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

# --- Grafana ---
grafana:
  enabled: true

  # Disable the chart's auto-generated default Prometheus datasource
  # (we define our own in the datasources section below)
  defaultDatasourceEnabled: true

  # Admin credentials (change in production!)
  adminUser: admin
  adminPassword: admin-password         # CHANGE THIS in production

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Persistence for dashboards and settings
  persistence:
    enabled: true
    size: 2Gi

  # Additional datasources (Loki added here; Prometheus + Alertmanager are auto-configured by the chart)
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy

  # Service type for access
  service:
    type: NodePort
    nodePort: 30000                     # Access Grafana at localhost:30000

  # Sidecar for auto-loading dashboards from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

# --- Alertmanager ---
alertmanager:
  enabled: true

  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # Alertmanager configuration (routing + receivers)
  config:
    global:
      resolve_timeout: 5m               # Mark alert resolved after 5m of silence

    # Route tree: how alerts are grouped and routed
    route:
      group_by: ['alertname', 'namespace', 'job']
      group_wait: 30s                   # Wait before sending first notification
      group_interval: 5m                # Wait before sending updates for a group
      repeat_interval: 4h               # Re-send if alert still firing after 4h
      receiver: 'default-receiver'      # Default receiver
      routes:
        - match:
            severity: critical
          receiver: 'critical-receiver'
          group_wait: 10s               # Send critical alerts faster
        - match:
            severity: warning
          receiver: 'default-receiver'

    # Receivers: where alerts are sent
    receivers:
      - name: 'default-receiver'
        # Webhook receiver (for testing; replace with Slack/PagerDuty in prod)
        webhook_configs:
          - url: 'http://alertmanager-webhook:9095/webhook'
            send_resolved: true

      - name: 'critical-receiver'
        webhook_configs:
          - url: 'http://alertmanager-webhook:9095/webhook'
            send_resolved: true
        # Slack example (uncomment and configure):
        # slack_configs:
        #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
        #     channel: '#alerts-critical'
        #     title: '{{ .GroupLabels.alertname }}'
        #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

    # Inhibition rules: suppress less severe alerts when critical is firing
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']

# --- Node Exporter ---
nodeExporter:
  enabled: true                         # Collects host-level metrics (CPU, disk, network)

# --- kube-state-metrics ---
kubeStateMetrics:
  enabled: true                         # Collects Kubernetes object state metrics

# --- Prometheus Operator ---
prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
